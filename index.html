  <meta charset="UTF-8">
  <title>docsify</title>

  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="/themes/buble.css" title="buble" disabled> -->

    nav.app-nav li ul {
      min-width: 100px;
    }
  </style> -->
</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      alias: {
        '.*?/awesome': 'https://raw.githubusercontent.com/docsifyjs/awesome-docsify/master/README.md',
        '.*?/changelog': 'https://raw.githubusercontent.com/docsifyjs/docsify/master/CHANGELOG.md',
        '/.*/_navbar.md': '/_navbar.md',
        '/zh-cn/(.*)': 'https://raw.githubusercontent.com/docsifyjs/docs-zh/master/$1',
        '/de-de/(.*)': 'https://raw.githubusercontent.com/docsifyjs/docs-de/master/$1',
        '/ru/(.*)': 'https://raw.githubusercontent.com/docsifyjs/docs-ru/master/$1',
        '/es/(.*)': 'https://raw.githubusercontent.com/docsifyjs/docs-es/master/$1'
      },
      auto2top: true,
      basePath: '/docs/',
      coverpage: true,
      executeScript: true,
      loadSidebar: true,
      loadNavbar: true,
      mergeNavbar: true,
      hideOtherSidebarContent: false,
      // maxLevel: 4,
      // subMaxLevel: 2,
      // name: 'docsify',
      search: 'auto', // default

      // complete configuration parameters
      search: {
        maxAge: 86400000, // Expiration time, the default one day
        paths: 'auto',
        placeholder: 'Type to search',
        noData: 'No Results!',
        // Headline depth, 1 - 6
        depth: 6,
        hideOtherSidebarContent: false, // whether or not to hide other sidebar content

      },
      executeScript: true,
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (html) {
            if (/githubusercontent\.com/.test(vm.route.file)) {
              url = vm.route.file
                .replace('raw.githubusercontent.com', 'github.com')
                .replace(/\/master/, '/blob/master')
            } else {
              url = 'https://github.com/docsifyjs/docsify/blob/master/docs/' + vm.route.file
            }
            var editHtml = '[:memo: Edit Document](' + url + ')\n'

            return editHtml
              + html
              + '\n\n----\n\n'
              + '<a href="https://docsify.js.org" target="_blank" style="color: inherit; font-weight: normal; text-decoration: none;">Powered by docsify</a>'
          });
          // var footer = [
          //   '<hr/>',
          //   '<footer>',
          //   '<span><a href="https://github.com/QingWei-Li">cinwell</a> &copy;2017.</span>',
          //   '<span>Proudly published with <a href="https://github.com/docsifyjs/docsify" target="_blank">docsify</a>.</span>',
          //   '</footer>'
          // ].join('');



          // hook.afterEach(function (html) {
          //   return html + footer;
          // });

        },
      ]
    }
  </script>
  <!-- <script src="//unpkg.com/docsify/lib/docsify.js"></script> -->
  <script src="./src/plugins/search/docsify.js"></script>
  <script src="./src/plugins/search/search.js"></script>
  <!-- <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script> -->

</body>

</html>
